<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>پنل کاربری</title>
  <style>
    @font-face {
      font-family: Vazirmatn;
      src: url("https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn%5Bwght%5D.woff2") format("woff2-variations");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --ink: #f6f7fb;
      --muted: rgba(246, 247, 251, 0.68);
      --faint: rgba(246, 247, 251, 0.42);
      --line: rgba(255, 255, 255, 0.18);
      --line-soft: rgba(255, 255, 255, 0.10);
      --glass: rgba(10, 12, 22, 0.82);
      --glass-2: rgba(8, 10, 18, 0.72);
      --glass-3: rgba(12, 15, 26, 0.88);
      --surface: rgba(10, 12, 20, 0.72);
      --surface-strong: rgba(10, 12, 20, 0.78);
      --chip-bg: rgba(8, 10, 16, 0.65);
      --nav-bg: rgba(10, 14, 26, 0.92);
      --nav-border: rgba(143, 199, 255, 0.20);
      --nav-tab-active: rgba(10, 12, 20, 0.40);
      --accent-line: rgba(143, 199, 255, 0.20);
      --accent-surface: rgba(143, 199, 255, 0.035);
      --accent-surface-strong: rgba(143, 199, 255, 0.12);
      --accent-border-mid: rgba(143, 199, 255, 0.36);
      --chart-border: rgba(143, 199, 255, 0.18);
      --chart-surface: rgba(143, 199, 255, 0.035);
      --bar-border: rgba(143, 199, 255, 0.16);
      --bar-fill-border: rgba(143, 199, 255, 0.38);
      --bar-fill-surface: rgba(143, 199, 255, 0.12);
      --good-line: rgba(112, 228, 157, 0.42);
      --good-surface: rgba(112, 228, 157, 0.11);
      --good-surface-strong: rgba(112, 228, 157, 0.12);
      --good-line-soft: rgba(112, 228, 157, 0.38);
      --warn-line: rgba(244, 200, 108, 0.42);
      --warn-surface: rgba(244, 200, 108, 0.12);
      --warn-line-soft: rgba(244, 200, 108, 0.36);
      --bad-line: rgba(255, 143, 134, 0.42);
      --bad-surface: rgba(255, 143, 134, 0.12);
      --bad-line-soft: rgba(255, 143, 134, 0.36);
      --bad-line-strong: rgba(255, 143, 134, 0.50);
      --bad-surface-strong: rgba(255, 143, 134, 0.14);
      --os-current-line: rgba(112, 228, 157, 0.58);
      --os-current-surface: rgba(112, 228, 157, 0.10);
      --modal-overlay: rgba(0, 0, 0, 0.28);
      --accent: #8fc7ff;
      --good: #70e49d;
      --warn: #f4c86c;
      --bad: #ff8f86;
      --border: 1px solid var(--line-soft);
      --r-card: 22px;
      --r-box: 16px;
      --r-control: 14px;
      --r-sm: 12px;
      --r-group: 18px;
      --page: 1120px;
      --nav-height: 70px;
      --nav-offset: 22px;
      --nav-gap: 28px;
      --stat-cyan: #22d3ee;
      --stat-cyan-bg: rgba(34, 211, 238, 0.12);
      --stat-violet: #c084fc;
      --stat-violet-bg: rgba(192, 132, 252, 0.12);
      --stat-teal: #2dd4bf;
      --stat-teal-bg: rgba(45, 212, 191, 0.12);
      --stat-orange: #fb923c;
      --stat-orange-bg: rgba(251, 146, 60, 0.12);
      --stat-rose: #f472b6;
      --stat-rose-bg: rgba(244, 114, 182, 0.12);
      --stat-indigo: #7b9cff;
      --stat-indigo-bg: rgba(123, 156, 255, 0.12);
      --stat-fuchsia: #f072ff;
      --stat-fuchsia-bg: rgba(240, 114, 255, 0.12);
      --stat-lime: #d4f06a;
      --stat-lime-bg: rgba(212, 240, 106, 0.12);
    }

    html[data-theme="light"] {
      color-scheme: light;
      --ink: #0b1220;
      --muted: rgba(11, 18, 32, 0.72);
      --faint: rgba(11, 18, 32, 0.52);
      --line: rgba(11, 18, 32, 0.14);
      --line-soft: rgba(11, 18, 32, 0.10);
      --glass: rgba(255, 255, 255, 0.92);
      --glass-2: rgba(255, 255, 255, 0.85);
      --glass-3: rgba(255, 255, 255, 0.96);
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --chip-bg: rgba(255, 255, 255, 0.82);
      --nav-bg: rgba(255, 255, 255, 0.94);
      --nav-border: rgba(0, 91, 181, 0.14);
      --nav-tab-active: rgba(255, 255, 255, 0.42);
      --accent-line: rgba(0, 91, 181, 0.18);
      --accent-surface: rgba(0, 91, 181, 0.035);
      --accent-surface-strong: rgba(0, 91, 181, 0.10);
      --accent-border-mid: rgba(0, 91, 181, 0.30);
      --chart-border: rgba(0, 91, 181, 0.16);
      --chart-surface: rgba(0, 91, 181, 0.035);
      --bar-border: rgba(0, 91, 181, 0.16);
      --bar-fill-border: rgba(0, 91, 181, 0.30);
      --bar-fill-surface: rgba(0, 91, 181, 0.10);
      --good-line: rgba(8, 122, 57, 0.38);
      --good-surface: rgba(8, 122, 57, 0.10);
      --good-surface-strong: rgba(8, 122, 57, 0.10);
      --good-line-soft: rgba(8, 122, 57, 0.30);
      --warn-line: rgba(245, 130, 11, 0.34);
      --warn-surface: rgba(245, 130, 11, 0.08);
      --warn-line-soft: rgba(244, 200, 108, 0.36);
      --bad-line: rgba(168, 40, 34, 0.32);
      --bad-surface: rgba(168, 40, 34, 0.08);
      --bad-line-soft: rgba(168, 40, 34, 0.34);
      --bad-line-strong: rgba(168, 40, 34, 0.34);
      --bad-surface-strong: rgba(168, 40, 34, 0.10);
      --os-current-line: rgba(8, 122, 57, 0.42);
      --os-current-surface: rgba(8, 122, 57, 0.08);
      --modal-overlay: rgba(240, 245, 252, 0.52);
      --accent: #005bb5;
      --good: #087a39;
      --warn: #7a4b00;
      --bad: #a82822;
      --stat-cyan: #0284c7;
      --stat-cyan-bg: rgba(2, 132, 199, 0.10);
      --stat-violet: #7c3aed;
      --stat-violet-bg: rgba(124, 58, 237, 0.10);
      --stat-teal: #0d9488;
      --stat-teal-bg: rgba(13, 148, 136, 0.10);
      --stat-orange: #c2410c;
      --stat-orange-bg: rgba(194, 65, 12, 0.10);
      --stat-rose: #db2777;
      --stat-rose-bg: rgba(219, 39, 119, 0.10);
      --stat-indigo: #4338ca;
      --stat-indigo-bg: rgba(67, 56, 202, 0.10);
      --stat-fuchsia: #c026d3;
      --stat-fuchsia-bg: rgba(192, 38, 211, 0.10);
      --stat-lime: #65a30d;
      --stat-lime-bg: rgba(101, 163, 13, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      padding:
        max(38px, env(safe-area-inset-top))
        26px
        calc(var(--nav-height) + var(--nav-offset) + env(safe-area-inset-bottom, 0px) + var(--nav-gap));
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 0%, rgba(110, 150, 255, 0.11), transparent 30%),
        radial-gradient(circle at 84% 8%, rgba(255, 255, 255, 0.045), transparent 26%),
        linear-gradient(165deg, #020308 0%, #070a12 54%, #03040a 100%);
      font-family: Vazirmatn, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html[dir="rtl"] body {
      text-align: right;
    }

    html[dir="ltr"] body {
      text-align: left;
    }

    html[data-theme="light"] body {
      background:
        radial-gradient(circle at 12% 0%, rgba(120, 170, 240, 0.12), transparent 34%),
        radial-gradient(circle at 88% 6%, rgba(255, 255, 255, 0.98), transparent 32%),
        linear-gradient(165deg, #ffffff 0%, #f6f9fd 52%, #fbfcfe 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.55;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    html[data-theme="light"] body::before {
      background:
        linear-gradient(rgba(12, 24, 48, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 24, 48, 0.022) 1px, transparent 1px);
    }

    button,
    input,
    a {
      font: inherit;
    }

    button {
      color: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
      max-width: 100%;
    }

    button,
    input {
      max-width: 100%;
    }

    .brand-title,
    .brand-sub,
    .username,
    .subline,
    .title,
    .note,
    .k,
    .v,
    .item-title,
    .os-name,
    .app-name,
    .app-desc,
    .sheet-title,
    .sheet-sub,
    .qr-title,
    .bar-wrap span {
      max-width: 100%;
    }

    .shell {
      width: min(100%, var(--page));
      margin: 0 auto;
    }

    .glass {
      position: relative;
      border: var(--border);
      border-radius: var(--r-card);
      background: var(--glass);
      contain: layout style paint;
    }

    .alert-banner {
      contain: layout style paint;
    }

    .topbar {
      position: relative;
      z-index: 40;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      min-height: 64px;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: var(--r-card);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
      border-radius: var(--r-control);
      border: var(--border);
      background: var(--surface-strong);
      color: var(--ink);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: contain;
    }

    .brand-logo.has-image img {
      display: block;
    }

    .brand-logo.has-image svg {
      display: none;
    }

    .brand-logo svg,
    .icon svg,
    .tab svg,
    .nav-tab svg,
    .icon-btn svg,
    .os-icon svg,
    .app-icon svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text,
    .item-main,
    .os-info,
    .app-info,
    .sheet-head > div,
    .status-line,
    .chip-row,
    .section-head > div {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 15px;
      font-weight: 760;
      letter-spacing: -0.025em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 520;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tabs {
      display: none;
      gap: 4px;
      padding: 4px;
      border: var(--border);
      border-radius: var(--r-group);
      background: var(--chip-bg);
    }

    .tab {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 12px;
      border: 0;
      border-radius: var(--r-control);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      transition: 160ms ease;
    }

    .tab span:last-child,
    .nav-tab span:last-child,
    .small-btn span:last-child,
    .ghost span:last-child,
    .chip,
    .badge {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body[data-view="account"] .tab[data-view="account"],
    body[data-view="configs"] .tab[data-view="configs"],
    body[data-view="apps"] .tab[data-view="apps"],
    body[data-view="account"] .nav-tab[data-view="account"],
    body[data-view="configs"] .nav-tab[data-view="configs"],
    body[data-view="apps"] .nav-tab[data-view="apps"] {
      color: var(--ink);
      background: var(--glass-3);
      border: var(--border);
    }

    body[data-view="account"] .mobile-nav .nav-tab[data-view="account"] {
      color: #fff;
      border-color: var(--accent-border-mid);
      background: var(--accent-surface-strong);
    }

    body[data-view="account"] .mobile-nav .nav-tab[data-view="account"] svg {
      color: var(--accent);
    }

    body[data-view="configs"] .mobile-nav .nav-tab[data-view="configs"] {
      color: #fff;
      border-color: var(--warn-line-soft);
      background: var(--warn-surface);
    }

    body[data-view="configs"] .mobile-nav .nav-tab[data-view="configs"] svg {
      color: var(--stat-orange);
    }

    body[data-view="apps"] .mobile-nav .nav-tab[data-view="apps"] {
      color: #fff;
      border-color: var(--good-line-soft);
      background: var(--good-surface-strong);
    }

    body[data-view="apps"] .mobile-nav .nav-tab[data-view="apps"] svg {
      color: var(--good);
    }

    html[data-theme="light"] body[data-view="account"] .mobile-nav .nav-tab[data-view="account"] {
      color: var(--accent);
      border-color: var(--accent-border-mid);
      background: var(--accent-surface-strong);
    }

    html[data-theme="light"] body[data-view="configs"] .mobile-nav .nav-tab[data-view="configs"] {
      color: var(--stat-orange);
      border-color: var(--warn-line);
      background: var(--stat-orange-bg);
    }

    html[data-theme="light"] body[data-view="apps"] .mobile-nav .nav-tab[data-view="apps"] {
      color: var(--good);
      border-color: var(--good-line-soft);
      background: var(--good-surface-strong);
    }

    .actions {
      display: flex;
      gap: 6px;
      align-items: center;
      direction: ltr;
    }

    #lang-btn { order: 1; }
    #theme-btn { order: 2; }
    #support-btn { order: 3; }

    html[dir="ltr"] #support-btn { order: 1; }
    html[dir="ltr"] #theme-btn { order: 2; }
    html[dir="ltr"] #lang-btn { order: 3; }

    .icon-btn,
    .small-btn,
    .ghost,
    .range-btn {
      border: var(--border);
      border-radius: var(--r-control);
      background: var(--glass-2);
      color: var(--ink);
      appearance: none;
      -webkit-appearance: none;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
      flex: 0 0 auto;
      text-decoration: none;
    }

    .icon-btn.copied,
    .ghost.copied {
      border-color: var(--good-line-soft);
      background: var(--good-surface-strong);
      color: var(--good);
    }

    .icon-btn.hidden {
      display: none;
    }

    .small-btn,
    .ghost {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 11px;
      font-size: 12px;
      font-weight: 680;
      text-align: center;
      line-height: 1;
    }

    .ghost span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #copy-all {
      position: relative;
      min-width: 112px;
      padding-inline: 34px;
    }

    #copy-all [data-svg] {
      position: absolute;
      inset-inline-start: 12px;
    }

    #copy-all [data-i18n] {
      width: 100%;
      text-align: center;
    }

    button:active,
    a:active {
      transform: scale(0.985);
    }

    .view {
      display: none;
    }

    body[data-view="account"] #view-account,
    body[data-view="configs"] #view-configs,
    body[data-view="apps"] #view-apps {
      display: block;
    }

    body[data-view-dir="next"][data-view="account"] #view-account,
    body[data-view-dir="next"][data-view="configs"] #view-configs,
    body[data-view-dir="next"][data-view="apps"] #view-apps {
      animation: view-enter-next 240ms ease;
    }

    body[data-view-dir="prev"][data-view="account"] #view-account,
    body[data-view-dir="prev"][data-view="configs"] #view-configs,
    body[data-view-dir="prev"][data-view="apps"] #view-apps {
      animation: view-enter-prev 240ms ease;
    }

    @keyframes view-enter-next {
      from {
        opacity: 0.62;
        transform: translateX(12px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes view-enter-prev {
      from {
        opacity: 0.62;
        transform: translateX(-12px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    html[dir="rtl"] body[data-view-dir="next"][data-view="account"] #view-account,
    html[dir="rtl"] body[data-view-dir="next"][data-view="configs"] #view-configs,
    html[dir="rtl"] body[data-view-dir="next"][data-view="apps"] #view-apps {
      animation-name: view-enter-prev;
    }

    html[dir="rtl"] body[data-view-dir="prev"][data-view="account"] #view-account,
    html[dir="rtl"] body[data-view-dir="prev"][data-view="configs"] #view-configs,
    html[dir="rtl"] body[data-view-dir="prev"][data-view="apps"] #view-apps {
      animation-name: view-enter-next;
    }

    .account-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .panel {
      padding: 22px;
    }

    .profile {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 9px;
      border: var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: var(--chip-bg);
      font-size: 11px;
      font-weight: 620;
    }

    .chip.status-active {
      color: var(--good);
      border-color: var(--good-line);
      background: var(--good-surface);
    }

    .chip.status-warn {
      color: var(--warn);
      border-color: var(--warn-line-soft);
      background: var(--warn-surface);
    }

    .chip.status-bad {
      color: var(--bad);
      border-color: var(--bad-line-soft);
      background: var(--bad-surface);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--good);
    }

    .dot.warn {
      background: var(--warn);
    }

    .dot.bad {
      background: var(--bad);
    }

    .username {
      margin: 6px 0 0;
      font-size: clamp(28px, 5vw, 50px);
      font-weight: 760;
      line-height: 0.98;
      letter-spacing: -0.02em;
      direction: ltr;
      text-align: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subline {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 470;
      line-height: 1.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subline:empty {
      display: none;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 6px;
    }

    .metric,
    .detail,
    .config-card,
    .app-card,
    .os-card {
      border: var(--border);
      border-radius: var(--r-box);
      background: var(--surface);
    }

    .metric {
      min-height: 86px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      text-align: right;
    }

    .stat-top {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: none;
      border-radius: var(--r-sm);
      flex: 0 0 auto;
      line-height: 0;
    }

    .stat-icon svg {
      width: 17px;
      height: 17px;
      display: block;
      opacity: 0.96;
    }

    .stat-icon.tone-accent {
      background: var(--accent-surface);
      color: var(--accent);
    }

    .stat-icon.tone-good {
      background: var(--good-surface);
      color: var(--good);
    }

    .stat-icon.tone-warn {
      background: var(--warn-surface);
      color: var(--warn);
    }

    .stat-icon.tone-bad {
      background: var(--bad-surface);
      color: var(--bad);
    }

    .stat-icon.tone-muted {
      background: var(--chip-bg);
      color: var(--muted);
    }

    .stat-icon.tone-cyan {
      background: var(--stat-cyan-bg);

  function cleanToken(value) {

    try {

    params.forEach(function (_v, key) { keys.push(key); });
    for (var i = 0; i < keys.length; i++) {
      if (String(keys[i]).toLowerCase() === name) return params.get(keys[i]);
    }
    return "";
  }

  function wgList(value) {
    return String(value || "").split(",").map(function (part) { return part.trim(); }).filter(Boolean).join(", ");
  }

  function linkType(raw) {
    raw = String(raw || "").toLowerCase();
    if (raw.indexOf("vless://") === 0) return "VLESS";
    if (raw.indexOf("vmess://") === 0) return "VMess";
    if (raw.indexOf("trojan://") === 0) return "Trojan";
    if (raw.indexOf("wireguard://") === 0 || raw.indexOf("[interface]") === 0) return "WireGuard";
    if (raw.indexOf("hysteria") === 0) return "Hysteria";
    if (raw.indexOf("ss://") === 0 || raw.indexOf("shadowsocks") === 0) return "Shadowsocks";
    if (/^https?:\/\//.test(raw)) return "Link";
    return "Proxy";
  }

  function configName(raw) {
    raw = String(raw || "");
    try {
      if (raw.toLowerCase().indexOf("vmess://") === 0) {
        var data = JSON.parse(b64(raw.slice(8)));
        if (data && data.ps) return decodeSafe(data.ps);
      }
      var u = new URL(raw);
      var hash = decodeSafe(u.hash.replace(/^#/, ""));
      if (hash) return hash;
      return decodeSafe(u.searchParams.get("name") || u.searchParams.get("remark") || u.searchParams.get("tag") || "");
    } catch (e) {}
    var index = raw.indexOf("#");
    return index >= 0 ? decodeSafe(raw.slice(index + 1)) : "";
  }

  function normalizeApp(app) {
    if (typeof app === "string") return { name: app, platform: detectPlatform(app), download_links: [], import_url: "", icon: "" };
    app = app || {};
    var name = app.name || app.title || app.app || app.client || app.label || app.platform || "App";
    var platform = canonical(app.platform || app.os || app.client_type || detectPlatform([name, app.url, app.link, app.download].join(" ")));
    var links = app.download_links || app.downloads || app.links || [];
    if (!Array.isArray(links)) links = [];
    var direct = app.url || app.link || app.download || app.href;
    if (direct) {
      links = [{
        name: app.download_name || tr("download"),
        url: direct,
        language: app.download_language || app.language || app.lang || ""
      }].concat(links);
    }
    return {
      name: name,
      platform: platform,
      description: app.description || app.desc || app.subtitle || "",
      download_links: links,
      import_url: app.import_url || app.import || app.add_url || "",
      recommended: !!app.recommended,
      icon: app.icon_url || app.icon || app.logo_url || app.logo || app.image_url || app.image || ""
    };
  }

  function renderApps() {
    if (!state.apps.length) {
      $("os-grid").innerHTML = '<div class="empty">' + esc(tr("noApps")) + '</div>';
      return;
    }
    var groups = {};
    state.apps.forEach(function (app) {
      var key = canonical(app.platform);
      if (!groups[key]) groups[key] = [];
      groups[key].push(app);
    });
    state.groups = groups;
    var current = currentOS();
    var order = ["ios", "android", "windows", "macos", "linux", "appletv", "androidtv", "web", "other"];
    if (groups[current]) order = [current].concat(order.filter(function (x) { return x !== current; }));
    var keys = order.filter(function (key) { return groups[key] && groups[key].length; });
    Object.keys(groups).sort().forEach(function (key) { if (keys.indexOf(key) < 0) keys.push(key); });
    $("os-grid").innerHTML = keys.map(function (key) {
      var list = groups[key];
      return '<article class="os-card ' + (key === current ? "current" : "") + '" data-platform="' + esc(key) + '">' +
        '<span class="os-icon">' + platformIcon(key) + '</span><span class="os-info"><span class="os-top"><span class="os-name">' + esc(platformLabel(key)) + '</span><span class="badge-wrap">' +
        (key === current ? '<span class="badge current-tag">' + esc(tr("yourOS")) + '</span>' : '') +
        '</span></span></span><button class="small-btn os-open" type="button">' + esc(tr("openApps")) + '</button></article>';
    }).join("");
  }

  function actionLinkClass(label) {
    var text = String(label || "").toLowerCase();
    if (/خروج|exit|logout|log\s?out|sign\s?out|leave/.test(text)) return "action-exit";
    if (/افزودن|import|add\s+sub|subscribe|subscription|اضافه/.test(text)) return "action-import";
    return "action-download";
  }

  function openApps(platform) {
    var list = state.groups[platform] || [];
    state.appsModalPlatform = platform;
    $("apps-modal-title").textContent = platformLabel(platform);
    $("apps-modal-sub").textContent = num(list.length) + " " + tr("app");
    $("app-list").innerHTML = list.map(appHtml).join("");
    openModal("apps-modal");
  }

  function appHtml(app) {
    var desc = pickAppText(app.description);
    var iconHtml = app.icon
      ? '<img src="' + esc(resolveUrl(app.icon)) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\'"><span style="display:none;width:100%;height:100%;place-items:center;">' + platformIcon(app.platform) + '</span>'
      : platformIcon(app.platform);
    var links = filterAppDownloadLinks(app.download_links || []);
    var linkHtml = links.map(function (item) {
      var label = pickAppText(item.name) || (typeof item.name === "string" ? item.name : "") || tr("download");
      return '<a class="' + esc(actionLinkClass(label)) + '" href="' + esc(resolveUrl(item.url)) + '" target="_blank" rel="noopener">' + esc(label) + '</a>';
    }).join("");
    var importHtml = app.import_url ? '<a class="import action-import" href="' + esc(resolveUrl(app.import_url)) + '" target="_blank" rel="noopener">' + esc(tr("import")) + '</a>' : "";
    var actions = linkHtml + importHtml;
    return '<article class="app-card"><div class="app-head"><span class="app-icon">' + iconHtml + '</span><span class="app-info"><span class="app-name">' + esc(pickAppText(app.name) || (typeof app.name === "string" ? app.name : "App")) + (app.recommended ? ' <span class="badge rec">' + esc(tr("recommended")) + '</span>' : '') + '</span>' + (desc ? '<p class="app-desc">' + esc(desc) + '</p>' : '') + '</span></div>' + (actions ? '<div class="app-actions">' + actions + '</div>' : '') + '</article>';
  }

  function normalizeUsage(data) {
    var out = {};
    var stats = data && (data.stats || data.data || data.usage || data);
    function add(point) {
      if (!point || typeof point !== "object") return;
      var key = point.period_start || point.time || point.date || point.created_at;
      var value = point.total_traffic || point.traffic || point.used_traffic || point.value || 0;
      if (!key) return;
      out[key] = (out[key] || 0) + (Number(value) || 0);
    }
    if (Array.isArray(stats)) stats.forEach(add);
    else if (stats && typeof stats === "object") {
      Object.keys(stats).forEach(function (key) {
        if (Array.isArray(stats[key])) stats[key].forEach(add);
        else if (typeof stats[key] === "number") out[key] = (out[key] || 0) + stats[key];
      });
    }
    return Object.keys(out).sort().map(function (key) { return { time: key, value: out[key] }; });
  }

  function renderUsage(points, range) {
    points = points || [];
    if (!points.length) {
      $("usage-total").textContent = tr("usageTotal") + ": —";
      $("chart").innerHTML = '<div class="empty">' + esc(tr("noUsage")) + '</div>';
      return;
    }
    var maxBars = range === "1d" ? 8 : (range === "7d" ? 7 : 10);
    var bucket = Math.max(1, Math.ceil(points.length / maxBars));
    var bars = [];
    for (var i = 0; i < points.length; i += bucket) {
      bars.push({
        time: points[i].time,
        value: points.slice(i, i + bucket).reduce(function (sum, p) { return sum + Number(p.value || 0); }, 0)
      });
    }
    var max = Math.max.apply(null, bars.map(function (bar) { return bar.value; })) || 1;
    var total = bars.reduce(function (sum, bar) { return sum + bar.value; }, 0);
    $("usage-total").textContent = tr("usageTotal") + ": " + bytes(total);
    $("chart").innerHTML = '<div class="bars" style="--bars:' + bars.length + '">' + bars.map(function (bar, index) {
      var height = Math.max(8, Math.round(bar.value / max * 100));
      return '<div class="bar-wrap"><div class="bar" title="' + esc(bytes(bar.value)) + '"><i style="--h:' + height + '%"></i><b>' + esc(shortBytes(bar.value)) + '</b></div><span>' + esc(tick(bar.time, range, index, bars.length)) + '</span></div>';
    }).join("") + '</div>';
  }

  function tick(time, range, index, count) {
    var d = new Date(time || Date.now() - Math.max(0, count - 1 - index) * (range === "1d" ? 3 * 3600000 : 86400000));
    if (isNaN(d.getTime())) return "";
    try {
      return new Intl.DateTimeFormat(range === "1d" ? "en-US" : (fa() ? "fa-IR" : "en-US"), {
        hour: range === "1d" ? "2-digit" : undefined,
        hour12: false,
        weekday: range !== "1d" ? "short" : undefined,
        day: range === "30d" ? "numeric" : undefined
      }).format(d).replace(/^24$/, "00");
    } catch (e) { return ""; }
  }

  function refreshUsageView() {
    if (!state.ctx) return;
    document.querySelectorAll(".range-btn").forEach(function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-range") === state.range);
    });
    if (state.usageRaw !== null) {
      renderUsage(normalizeUsage(state.usageRaw), state.range);
      return;
    }
    loadUsage(state.range);
  }

  function loadUsage(range) {
    if (!state.ctx) return;
    state.range = range || state.range;
    document.querySelectorAll(".range-btn").forEach(function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-range") === state.range);
    });
    $("chart").innerHTML = '<div class="empty">' + esc(tr("loading")) + '</div>';
    var id = ++state.usageRequest;
    fetchUsage(state.range).then(function (data) {
      if (id !== state.usageRequest) return;
      state.usageRaw = data;
      renderUsage(normalizeUsage(data), state.range);
    });
  }

  function canonical(value) {
    value = String(value || "other").toLowerCase().replace(/[\s_-]+/g, "");
    if (value === "iphone" || value === "ipad" || value === "ipados") return "ios";
    if (value === "mac" || value === "macosx" || value === "macintosh") return "macos";
    if (value === "win" || value === "win32" || value === "win64") return "windows";
    if (value === "tvos" || value === "appletvos") return "appletv";
    if (value === "googletv" || value === "firetv") return "androidtv";
    if (value === "browser" || value === "pwa") return "web";
    return value || "other";
  }

  function detectPlatform(text) {
    text = String(text || "").toLowerCase();
    if (/ios|iphone|ipad|singbox-ios/.test(text)) return "ios";
    if (/android tv|google tv|fire tv/.test(text)) return "androidtv";
    if (/android|apk|hiddify-android/.test(text)) return "android";
    if (/windows|win64|win/.test(text)) return "windows";
    if (/mac|darwin|osx/.test(text)) return "macos";
    if (/linux|ubuntu|debian|appimage/.test(text)) return "linux";
    if (/web|browser|pwa/.test(text)) return "web";
    return "other";
  }

  function currentOS() {
    var ua = (navigator.userAgent || "").toLowerCase();
    var p = (navigator.platform || "").toLowerCase();
    if (/android tv|google tv|fire tv/.test(ua)) return "androidtv";
    if (/android/.test(ua)) return "android";
    if (/iphone|ipad|ipod/.test(ua) || (p === "macintel" && navigator.maxTouchPoints > 1)) return "ios";
    if (/win/.test(p) || /windows/.test(ua)) return "windows";
    if (/mac/.test(p) || /macintosh/.test(ua)) return "macos";
    if (/linux/.test(p) || /linux/.test(ua)) return "linux";
    return "other";
  }

  function platformLabel(platform) {
    var map = { ios: "iOS", android: "Android", windows: "Windows", macos: "macOS", linux: "Linux", appletv: "Apple TV", androidtv: "Android TV", web: "Web", other: tr("other") };
    return map[platform] || platform;
  }

  function platformIcon(platform) {
    platform = canonical(platform);
    if (platform === "ios" || platform === "macos" || platform === "appletv") return svg("apple");
    if (platform === "android" || platform === "androidtv") return svg("android");
    if (platform === "windows") return svg("windows");
    if (platform === "linux") return svg("linux");
    return svg("net");
  }

  function resolveUrl(url) {
    url = String(url || "");
    if (/^(https?:|data:image|blob:)/i.test(url)) return url;
    try { return new URL(url, state.ctx ? state.ctx.panel + "/" : location.href).href; } catch (e) { return url; }
  }

  function copyText(text, btn) {
    function done() {
      toast(tr("copied"), "success");
      if (btn) {
        btn.classList.add("copied");
        setTimeout(function () { btn.classList.remove("copied"); }, 900);
      }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(String(text || "")).then(done);
    var ta = document.createElement("textarea");
    ta.value = String(text || "");
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    done();
  }

  function loadQrLib() {
    if (window.QRCode) return Promise.resolve();
    if (state.qrPromise) return state.qrPromise;
    state.qrPromise = new Promise(function (resolve, reject) {
      var script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
      script.async = true;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
    return state.qrPromise;
  }

  function openQr(text, title) {
    $("qr-title").textContent = title || "QR";
    $("qr-canvas").textContent = tr("qrLoading");
    openModal("qr-modal");
    loadQrLib().then(function () {
      $("qr-canvas").innerHTML = "";
      try {
        new QRCode($("qr-canvas"), { text: text, width: 208, height: 208, colorDark: "#111827", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
      } catch (e) {
        closeModal("qr-modal");
        toast(tr("qrLong"));
      }
    }).catch(function () {
      closeModal("qr-modal");
      toast(tr("qrError"));
    });
  }

  function wireguardConfigText(raw) {
    raw = String(raw || "").trim();
    if (/^\[Interface\]/i.test(raw)) return raw.slice(-1) === "\n" ? raw : raw + "\n";
    if (!/^wireguard:\/\//i.test(raw)) return null;
    try {
      var u = new URL(raw);
      var p = u.searchParams;
      var privateKey = decodeSafe(u.username || wgParam(p, "privatekey") || "");
      var publicKey = wgParam(p, "publickey");
      var address = wgParam(p, "address");
      var endpoint = wgParam(p, "endpoint");
      if (!privateKey || !publicKey || !address) return null;
      var host = u.hostname;
      if (host && host.indexOf(":") >= 0 && host.charAt(0) !== "[") host = "[" + host + "]";
      if (!endpoint) endpoint = u.port ? host + ":" + u.port : host;
      var lines = ["[Interface]", "PrivateKey = " + privateKey.replace(/\s/g, "+"), "Address = " + wgList(address)];
      var dns = wgParam(p, "dns");
      if (dns) lines.push("DNS = " + wgList(dns));
      var mtu = wgParam(p, "mtu");
      if (mtu) lines.push("MTU = " + mtu);
      var reserved = wgParam(p, "reserved");
      if (reserved) lines.push("Reserved = " + reserved);
      lines.push("", "[Peer]", "PublicKey = " + publicKey.replace(/\s/g, "+"));
      var psk = wgParam(p, "presharedkey");
      if (psk) lines.push("PresharedKey = " + psk.replace(/\s/g, "+"));
      lines.push("AllowedIPs = " + wgList(wgParam(p, "allowedips") || "0.0.0.0/0, ::/0"));
      lines.push("Endpoint = " + endpoint);
      var keepalive = wgParam(p, "keepalive") || wgParam(p, "persistentkeepalive");
      lines.push("PersistentKeepalive = " + (keepalive || "25"));
      return lines.join("\n") + "\n";
    } catch (e) {
      return null;
    }
  }

  function wireguardFileName(raw, title) {
    title = String(title || "").trim();
    if (title && title !== tr("subLink")) return safeFile(title);
    try {
      if (/^wireguard:\/\//i.test(raw)) {
        var remark = decodeSafe(new URL(raw).hash.replace(/^#/, ""));
        if (remark) return safeFile(remark);
      }
    } catch (e) {}
    return safeFile("wireguard");
  }

  function safeFile(title) {
    title = String(title || "wireguard").replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-");
    return /\.conf$/i.test(title) ? title : title + ".conf";
  }

  function downloadText(text, name) {
    var blob = new Blob([text], { type: "application/x-wireguard-profile;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function decodeSafe(value) {
    try { return decodeURIComponent(String(value || "").replace(/\+/g, "%20")).trim(); }
    catch (e) { return String(value || "").trim(); }
  }

  function b64(value) {
    try {
      value = String(value || "").replace(/-/g, "+").replace(/_/g, "/").replace(/\s/g, "");
      while (value.length % 4) value += "=";
      var bin = atob(value);
      var out = Array.prototype.map.call(bin, function (c) { return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2); }).join("");
      return decodeURIComponent(out);
    } catch (e) { return ""; }
  }

  function openModal(id) {
    $(id).classList.add("show");
    $(id).setAttribute("aria-hidden", "false");
  }

  function closeModal(id) {
    $(id).classList.remove("show");
    $(id).setAttribute("aria-hidden", "true");
  }

  function renderAll() {
    renderAccount();
    renderNotice();
    renderSupport();
    renderConfigs();
    renderApps();
  }

  function start() {
    var ctx = makeContext(CONFIG.panelUrl || CONFIG.panel || "", CONFIG.subscriptionUrl || CONFIG.subscription || CONFIG.token || CONFIG.sub || "");
    if (!ctx) {
      toast(tr("invalid"));
      return;
    }
    loadAll(ctx);
  }

  function loadAll(ctx) {
    state.ctx = ctx;
    state.user = null;
    state.headers = {};
    state.links = [];
    state.apps = [];
    state.usageRaw = null;
    localStorage.setItem(LS.panel, ctx.panel);
    localStorage.setItem(LS.token, ctx.subUrl);
    loading(true);
    renderAll();
    loadUsage("1d");

    fetchInfo().then(function (res) {
      state.user = res.user || {};
      state.headers = res.headers || {};
      renderAll();
    }).catch(function (err) {
      var message = (err && err.message) || tr("infoError");
      if (location.protocol === "file:") message += " - " + tr("fileHint");
      toast(message);
    }).finally(function () {
      loading(false);
    });

    fetchLinks().then(function (links) {
      state.links = links || [];
      renderConfigs();
      renderAccount();
    });

    fetchApps().then(function (apps) {
      state.apps = apps || [];
      renderApps();
      renderAccount();
    });
  }

  function bindEvents() {
    $("copy-all").addEventListener("click", function () {
      copyText(state.links.join("\n") || (state.ctx && state.ctx.subUrl) || "", $("copy-all"));
    });
    $("config-list").addEventListener("click", function (event) {
      var btn = event.target.closest("[data-action]");
      if (!btn) return;
      var card = btn.closest(".config-card");
      if (!card) return;
      var payload = card.getAttribute("data-payload") || "";
      var title = card.getAttribute("data-title") || "";
      var action = btn.getAttribute("data-action");
      if (action === "copy") copyText(payload, btn);
      else if (action === "qr") openQr(payload, title);
      else if (action === "download") {
        var conf = wireguardConfigText(payload);
        if (conf) downloadText(conf, wireguardFileName(payload, title));
      }
    });
    $("os-grid").addEventListener("click", function (event) {
      var btn = event.target.closest(".os-open");
      if (!btn) return;
      var card = btn.closest(".os-card");
      if (card) openApps(card.getAttribute("data-platform"));
    });
    $("theme-btn").addEventListener("click", function () {
      state.theme = state.theme === "dark" ? "light" : "dark";
      localStorage.setItem(LS.theme, state.theme);
      applyTheme();
    });
    $("lang-btn").addEventListener("click", function () {
      state.lang = state.lang === "fa" ? "en" : "fa";
      localStorage.setItem(LS.lang, state.lang);
      applyLang();
    });
    document.querySelectorAll("[data-view]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        setView(btn.getAttribute("data-view"));
        if (btn.closest(".mobile-nav")) window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll(".range-btn").forEach(function (btn) {
      btn.addEventListener("click", function () { loadUsage(btn.getAttribute("data-range")); });
    });
    document.querySelectorAll("[data-close]").forEach(function (btn) {
      btn.addEventListener("click", function () { closeModal(btn.getAttribute("data-close")); });
    });
    document.querySelectorAll(".modal").forEach(function (modal) {
      modal.addEventListener("click", function (event) { if (event.target === modal) closeModal(modal.id); });
    });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeModal("apps-modal");
        closeModal("qr-modal");
      }
    });
  }

  function setupPerfMode() {
    var lite = false;
    try {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) lite = true;
      if (window.matchMedia("(pointer: coarse)").matches) {
        var cores = navigator.hardwareConcurrency || 8;
        var mem = navigator.deviceMemory || 8;
        if (cores <= 4 || mem <= 4) lite = true;
      }
    } catch (e) {}
    if (lite) document.documentElement.setAttribute("data-perf", "lite");
  }

  function init() {
    setupPerfMode();
    installSvg(document);
    applyTheme();
    applyLang();
    applyBrand();
    bindEvents();
    bindSwipeNav();
    var auto = detectUrl();
    if (auto) return loadAll(auto);
    var configured = makeContext(CONFIG.panelUrl || CONFIG.panel || "", CONFIG.subscriptionUrl || CONFIG.subscription || CONFIG.token || CONFIG.sub || "");
    if (configured) return loadAll(configured);
    var savedPanel = localStorage.getItem(LS.panel);
    var savedToken = localStorage.getItem(LS.token);
    if (savedPanel && savedToken) {
      var ctx = makeContext(savedPanel, savedToken);
      if (ctx) loadAll(ctx);
    }
  }

  init();
})();
  </script>
</body>
